  <meta property="og:type" content="website" />

  <meta property="og:description" content="실제 거주자가 남긴 방문록으로 입주하기전까지는 모르는 매물 정보로 합리적인 당신의 집 찾기를 시작하세요." />

</head>

<body>
  <div id="root">
    <style>
      .initial-loader-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        width: 100vw;
        background-color: #F2F4F6;
      }
      .initial-loader {
        width: 36px;
        height: 36px;
        border: 3px solid #E5E8EB;
        border-top-color: #3182F6;
        border-radius: 50%;
        animation: init-spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes init-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div class="initial-loader-wrapper">
      <div class="initial-loader"></div>
    </div>
  </div>
</body>

</html>
